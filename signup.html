<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Signup</legend>
            <label for="username">Enter USername:</label>
            <input type="text" id="username" placeholder="Enter username" name="username">
            <br><br>
            <label for="email">Enter Email:</label>
            <input type="email" id="email" placeholder="Enter email" name="email">
            <br><br>
            <label for="password">Enter Passowrd:</label>
            <input type="password" id="password" placeholder="Enter password" name="password">
            <br><br>
            <label for="age">Enter Age:</label>
            <input type="number" id="age" placeholder="Enter Age" name="age">
            <br><br>
            <label for="phNum">Enter Ph Number:</label>
            <input type="tel" minlength="10" maxlength="10" id="phNum" placeholder="Enter ph number" name="phNum">
            <br><br>
            <label for="dob">Enter DOB:</label>
            <input type="date" id="dob" placeholder="Enter DOB" name="dob">
            <br><br>
            <label for="imageUrl">Enter image URL</label>
            <input type="url" id="imageUrl" placeholder="Enter image url" name="imageUrl">
            <br><br>
            <button type="button" onclick="goToHome()">Submit</button>
            <button type="reset" onclick="resetSignup()">Reset</button>
        </fieldset>
    </form>
<script>
    function goToHome(){
        window.location.href = "HomePage.html";
    }
    function resetSignup(){
        document.getElementById("username").value = "";
        document.getElementById("email").value = "";
        document.getElementById("password").value = "";
        document.getElementById("age").value = "";
        document.getElementById("phNum").value = "";
        document.getElementById("dob").value = "";
        document.getElementById("imageUrl").value = "";
    }
</script>
</html>
